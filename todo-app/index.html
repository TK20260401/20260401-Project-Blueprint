<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルTODOアプリ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📝 マイTODO</h1>
        
        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                class="todo-input" 
                placeholder="新しいタスクを入力..."
                autocomplete="off"
            >
            <button id="addBtn" class="add-btn">追加</button>
        </div>

        <div class="stats">
            <span>全体: <span id="totalCount">0</span></span>
            <span>完了: <span id="completeCount">0</span></span>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="footer">
            <button id="clearBtn" class="clear-btn">完了したタスクを削除</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
