<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テトリス</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>テトリス</h1>
    <div class="game-area">
      <div class="side-panel left">
        <div class="info-box">
          <h3>HOLD</h3>
          <canvas id="holdCanvas" width="100" height="100"></canvas>
        </div>
      </div>
      <div class="board-wrapper">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="overlay" class="overlay hidden">
          <div class="overlay-text">
            <p id="overlayMessage">GAME OVER</p>
            <p class="sub">スペースキーでリスタート</p>
          </div>
        </div>
      </div>
      <div class="side-panel right">
        <div class="info-box">
          <h3>NEXT</h3>
          <canvas id="nextCanvas" width="100" height="300"></canvas>
        </div>
        <div class="info-box">
          <h3>SCORE</h3>
          <p id="score" class="stat">0</p>
        </div>
        <div class="info-box">
          <h3>LINES</h3>
          <p id="lines" class="stat">0</p>
        </div>
        <div class="info-box">
          <h3>LEVEL</h3>
          <p id="level" class="stat">1</p>
        </div>
      </div>
    </div>
    <div class="controls-info">
      <p>←→: 移動 ｜ ↑: 回転 ｜ ↓: 高速落下 ｜ Space: ハードドロップ ｜ C: ホールド ｜ P: ポーズ</p>
    </div>
    <div class="mobile-controls">
      <button id="btnLeft">◀</button>
      <button id="btnRotate">↻</button>
      <button id="btnDown">▼</button>
      <button id="btnRight">▶</button>
      <button id="btnDrop">⤓</button>
      <button id="btnHold">H</button>
    </div>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
