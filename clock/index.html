<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHK時計</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-stripes"></div>

    <div class="clock-container">
        <!-- 楕円フレーム + 時計 -->
        <div class="oval-frame">
            <div class="oval-inner">
                <canvas id="clock-canvas" width="400" height="400"></canvas>
            </div>
        </div>

        <!-- 日付 + デジタル時刻 + 天気 -->
        <div class="info-area">
            <div class="date-display" id="date-display"></div>
            <div class="digital-time" id="digital-time"></div>
            <div class="weather" id="weather">天気を取得中...</div>
        </div>

        <!-- 天気詳細パネル（タップで開閉） -->
        <div class="weather-panel" id="weather-panel">
            <div class="weather-panel-header">
                <select class="city-select" id="city-select" aria-label="都市選択"></select>
                <div class="weather-tabs">
                    <button type="button" class="weather-tab active" data-tab="hourly">時間</button>
                    <button type="button" class="weather-tab" data-tab="tomorrow">明日</button>
                    <button type="button" class="weather-tab" data-tab="week">週間</button>
                    <button type="button" class="weather-tab" data-tab="month">月間</button>
                </div>
                <button type="button" class="weather-close" id="weather-close">✕</button>
            </div>
            <div class="weather-content" id="weather-content">読み込み中...</div>
        </div>

        <!-- タイマー -->
        <div class="timer-panel">
            <!-- モード切替 -->
            <div class="timer-mode-toggle">
                <button type="button" class="mode-btn active" id="mode-down">カウントダウン</button>
                <button type="button" class="mode-btn" id="mode-up">カウントアップ</button>
            </div>

            <div class="timer-display" id="timer-display">00:00:00.00</div>

            <!-- プログレスバー兼スライダー -->
            <div class="timer-bar-container">
                <div class="timer-bar" id="timer-bar"></div>
                <input type="range" class="timer-slider" id="timer-slider" min="0" max="1000" value="0" aria-label="タイマー位置">
            </div>

            <!-- プリセット -->
            <div class="timer-presets" id="timer-presets">
                <button type="button" class="timer-preset-btn" data-minutes="1">1分</button>
                <button type="button" class="timer-preset-btn" data-minutes="3">3分</button>
                <button type="button" class="timer-preset-btn" data-minutes="5">5分</button>
                <button type="button" class="timer-preset-btn" data-minutes="10">10分</button>
                <button type="button" class="timer-preset-btn" data-minutes="15">15分</button>
                <button type="button" class="timer-preset-btn" data-minutes="30">30分</button>
                <button type="button" class="timer-preset-btn" data-minutes="45">45分</button>
                <button type="button" class="timer-preset-btn" data-minutes="60">60分</button>
            </div>

            <div class="timer-controls">
                <button type="button" class="timer-btn start" id="timer-start">スタート</button>
                <button type="button" class="timer-btn stop" id="timer-stop" disabled>ストップ</button>
                <button type="button" class="timer-btn reset" id="timer-reset">リセット</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
